<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sexo en el anexo - Álbum</title>
  <link rel="icon" type="image/png" href="imgs/logo-anexo.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Disco Anexo">
  <link rel="apple-touch-icon" href="imgs/logo-anexo.png">
  <link rel="stylesheet" href="estilo.css">
  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Tapa del disco -->
  <div class="album-cover" id="coverThumb">
    <img src="imgs/tapa-disco.jpg" alt="Sexo en el anexo" />
  </div>

  <!-- Lista dinámica de temas -->
  <section class="track-list" id="trackList"></section>

  <!-- Modal para mostrar letras -->
  <div class="modal" id="lyricsModal">
    <div class="modal-content">
      <button class="close" id="closeModal">&times;</button>
      <h2 id="lyricsTitle"></h2>
      <pre id="lyricsBody"></pre>
    </div>
  </div>

  <!-- Modal para mostrar tapa y contratapa -->
<div class="modal" id="coverModal">
  <div class="cover-images">
    <!-- Imagen de la tapa -->
    <img src="imgs/tapa-disco.jpg" alt="Tapa del disco" class="full-cover" />
    <!-- Imagen de la contratapa -->
    <img src="imgs/contratapa-disco.jpg" alt="Contratapa del disco" class="full-cover" />
  </div>
</div>

  
  <!-- Banner reproductor flotante -->
  <div class="player-banner" id="playerBanner">
    <img class="player-img" id="playerImg" src="" alt="" />
    <div class="player-info">
      <span class="player-title" id="playerTitle"></span>
      <div class="player-slider-row">
        <span class="player-time" id="playerCurrent">0:00</span>
        <input type="range" class="player-slider" id="playerSlider" min="0" max="100" value="0" step="0.1" />
        <span class="player-time" id="playerDuration">0:00</span>
      </div>
    </div>
    <div class="player-controls">
      <button id="playerRestart" title="Reiniciar"></button>
      <button id="playerPlayPause" title="Play / Pausa"></button>
      <button id="playerLyrics" title="Letra"></button>
    </div>
  </div>

  <footer>Disco Creado por el Anexo, con Gero y Adelga como principales escritores de los temas.&copy;</footer>
  <script src="main.js"></script>
</body>
</html>
